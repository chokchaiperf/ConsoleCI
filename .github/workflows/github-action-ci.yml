name: .NET Console App CI

on:
  push:
    branches: ['**']
    tags:
      - '[a-zA-Z]*-v[0-9]*.[0-9]*.[0-9]*-[0-9][0-9][0-9][0-9][0-9][0-9]'
  pull_request:

jobs:
  build_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Clean stamp file
        run: find . -name "obfuscate.stamp" -delete || true

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: |
          dotnet test --no-build --configuration Release \
            --logger "junit;LogFilePath=test-results/results.xml"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

      - name: Notify Telegram
        if: success()
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          NL=$'\n'
          BUILD_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          STAMP=$(find . -name "obfuscate.stamp" -not -path "*/obj/*" | head -1)
          if [ -f "$STAMP" ]; then
            OBFUSCATE="true"
          else
            OBFUSCATE="false"
          fi

          # CI Source
          if [ "$GITHUB_ACTIONS" = "true" ]; then
            CI_SOURCE="GitHub Actions"
          elif [ "$CIRCLECI" = "true" ]; then
            CI_SOURCE="CircleCI"
          else
            CI_SOURCE="Unknown"
          fi

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            TAG="$GITHUB_REF_NAME"
            if [[ $TAG =~ ^([a-zA-Z]+)-v([0-9]+\.[0-9]+\.[0-9]+)-([0-9]{6})$ ]]; then
              SLOT_KEY="${BASH_REMATCH[1]}"
              APP_VERSION="v${BASH_REMATCH[2]}"
              case $SLOT_KEY in
                sand)    SLOT_DISPLAY="Sandbox" ;;
                dev)     SLOT_DISPLAY="Development" ;;
                staging) SLOT_DISPLAY="Staging" ;;
                rel)     SLOT_DISPLAY="Release" ;;
                prod)    SLOT_DISPLAY="Production" ;;
                *)       SLOT_DISPLAY=$(echo $SLOT_KEY | tr '[:lower:]' '[:upper:]') ;;
              esac
            fi
            TITLE="🚀 <b>Release: $APP_VERSION</b>"
            EXTRA="${NL}📦 <b>Release Slot</b>  <code>$SLOT_DISPLAY</code>${NL}🏷 <b>App Version</b>  <code>$APP_VERSION</code>"
          else
            TITLE="✅ <b>Success: $GITHUB_JOB</b>"
            EXTRA=""
          fi

          MESSAGE="${TITLE}${NL}${NL}"
          MESSAGE+="⚙️ <b>CI</b>  <code>$CI_SOURCE</code>${NL}"
          MESSAGE+="🌿 <b>Branch</b>  <code>${GITHUB_REF_NAME}</code>"
          MESSAGE+="${EXTRA:+$EXTRA}"
          MESSAGE+="${NL}🔒 <b>Obfuscate</b>  <code>$OBFUSCATE</code>"
          MESSAGE+="${NL}📌 <b>Commit</b>${NL}"
          MESSAGE+="<code>$SHORT_SHA</code> $COMMIT_MSG${NL}${NL}"
          MESSAGE+="👤 <b>Triggered by</b>  $GITHUB_ACTOR${NL}"
          MESSAGE+="🔗 <a href=\"$BUILD_URL\">Run #$GITHUB_RUN_NUMBER</a>"

          jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg text "$MESSAGE" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}' | \
          curl -s -o /dev/null -X POST \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -H "Content-Type: application/json" \
            -d @-
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}